name: JobHunter Agent

on:
  schedule:
    - cron: "0 15 * * *"   # 7 AM PST
    - cron: "0 21 * * *"   # 1 PM PST
  workflow_dispatch:
  
jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run JobHunter
        run: |
          python jobhunter.py
